# 推送形如 v1.0.0 的 tag 时：构建 cnos.iso / kernel.elf 并发布到 GitHub Releases

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and GRUB
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            make \
            nasm \
            gcc-x86-64-elf \
            binutils-x86-64-elf \
            xorriso \
            grub-common \
            grub-pc-bin

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/x86_64-elf.cmake
          cmake --build build --target cnos_iso -j"$(nproc)"

      - name: Rename assets (tag in filename)
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp build/cnos.iso "cnos-${TAG}.iso"
          cp build/kernel.elf "kernel-${TAG}.elf"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CNOS ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cnos-${{ github.ref_name }}.iso
            kernel-${{ github.ref_name }}.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
